name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit on all files
        run: pre-commit run --all-files

  validate-manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Validate marketplace.json required fields
        run: |
          jq -e '.name and .description and .plugins and (.plugins | length > 0)' \
            .claude-plugin/marketplace.json
      - name: Validate ralph-review-trio plugin.json required fields
        run: |
          jq -e '.name and .version and .description and .repository' \
            plugins/ralph-review-trio/.claude-plugin/plugin.json
