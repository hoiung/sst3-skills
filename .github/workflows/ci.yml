name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Secret detection (blocking)
        run: python3 scripts/check-public-repo-secrets.py .
      - name: Commit-message secret scan — push events (blocking)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/check-public-repo-secrets.py \
            --scan-commit-messages \
            --since ${{ github.event.before }}
      - name: Commit-message secret scan — PR events (blocking)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/check-public-repo-secrets.py \
            --scan-commit-messages \
            --since ${{ github.event.pull_request.base.sha }}
      - name: Run pre-commit on all files
        run: pre-commit run --all-files

  validate-manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Validate marketplace.json required fields
        run: |
          jq -e '.name and .description and .plugins and (.plugins | length > 0)' \
            .claude-plugin/marketplace.json
      - name: Validate ralph-review-trio plugin.json required fields
        run: |
          jq -e '.name and .version and .description and .repository' \
            plugins/ralph-review-trio/.claude-plugin/plugin.json
